name: test

on:
  push:
    branches-ignore:
      - gh-pages
      - 'renovate/**'
  pull_request:

jobs:
  main:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - run: corepack enable
      - run: corepack prepare

      - run: yarn

      - run: yarn test

      - run: yarn build

  test-pass:
    name: test-pass
    needs: [main]
    runs-on: ubuntu-slim
    steps:
      - run: "true"
