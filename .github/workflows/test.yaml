name: test

on:
  push:
    branches-ignore:
      - gh-pages
      - 'renovate/**'
  pull_request:

jobs:
  main:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - run: corepack enable
      - run: corepack prepare

      - run: yarn

      - run: yarn test

      - run: yarn build

  test-pass:
    name: test-pass
    needs: [main]
    runs-on: ubuntu-slim
    steps:
      - run: "true"
